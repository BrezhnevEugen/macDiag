services:
  macdiag:
    build: .
    image: macdiag:latest
    ports:
      - "8000:8000"
    environment:
      MACDIAG_MODE: sim            # 'hw' won't work in Docker on macOS (no USB passthrough)
      MACDIAG_DB_PATH: /data/ecu_db.sqlite
      MACDIAG_UNLOCK_DB: /data/unlock_db.json
      MACDIAG_CBF_DIR: /data/cbf
      MACDIAG_CFF_DIR: /data/cff
      MACDIAG_VSG_DIR: /data/vsg
    volumes:
      # Persistent, EXTENSIBLE data store: CBF library + built DB + seed-key DB.
      # Add more blocks later by dropping CBFs into ./data/cbf and rebuilding
      # (see README). The image never needs rebuilding for new data.
      - ./data:/data
      # Optional: mount your full Vediamo CBF library read-only to cover every ECU.
      # Point MACDIAG_CBF_DIR at it instead, or copy what you need into ./data/cbf.
      # - /Users/you/Downloads/Vediamo/VediamoData:/vediamo:ro
    restart: unless-stopped
