[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["data", "driver", "docker"]

[tool.ruff.lint]
# keep the default (E4/E7/E9/F) rule set; the codebase predates the linter,
# stricter sets can be enabled file-by-file later
ignore = [
    "E701",  # compact `if x: y` one-liners are the codebase's house style
    "E702",  # ditto for `a; b` in tight parser loops
    "E731",  # lambda assignments are used deliberately in small helpers
    "E741",  # short names mirror the J2534/Caesar specs
]
